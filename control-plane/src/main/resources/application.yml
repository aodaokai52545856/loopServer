server:
  shutdown: graceful
  ssl:
    enabled: ${LOOP_TLS_ENABLED:false}
    client-auth: want
    key-store: ${LOOP_TLS_KEYSTORE:}
    key-store-password: ${LOOP_TLS_KEYSTORE_PASSWORD:}
    trust-store: ${LOOP_DEVICE_CA_TRUSTSTORE:}
    trust-store-password: ${LOOP_DEVICE_CA_TRUSTSTORE_PASSWORD:}
spring:
  application:
    name: loop-engine-control-plane
  datasource:
    url: ${LOOP_DB_URL:jdbc:postgresql://localhost:5432/loop_engine}
    username: ${LOOP_DB_USER:loop_engine}
    password: ${LOOP_DB_PASSWORD:loop_engine}
  flyway:
    enabled: true
management:
  endpoints.web.exposure.include: health,info,prometheus
loop.gitlab.webhook.token: ${LOOP_GITLAB_WEBHOOK_TOKEN}
